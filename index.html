<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>Home Inventory</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#1a1a2e;
    color:#e0e0e0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:28px;
    color:#fff;
}

/* Search */
.search-wrap{
    position:relative;
    max-width:600px;
    margin:0 auto 20px;
}

.search-wrap input{
    width:100%;
    padding:14px 20px 14px 45px;
    font-size:16px;
    border:2px solid #2a2a4a;
    border-radius:12px;
    outline:none;
    background:#16213e;
    color:#eee;
    transition:border-color .2s;
}

.search-wrap input::placeholder{color:#6a6a8a}
.search-wrap input:focus{border-color:#e94560}

.search-icon{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    font-size:18px;
    color:#6a6a8a;
}

/* Summary cards */
.summary{
    display:flex;
    gap:12px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:120px;
    background:#16213e;
    border-left:4px solid #e94560;
    border-radius:10px;
    padding:14px 16px;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
}

.card h2{font-size:12px;color:#8888aa;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.card .num{font-size:26px;font-weight:bold;color:#fff}

/* Toolbar */
.toolbar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
    align-items:center;
}

.box-tabs{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

.box-tab{
    padding:6px 14px;
    border:2px solid #2a2a4a;
    border-radius:8px;
    background:#16213e;
    color:#aaa;
    cursor:pointer;
    font-size:13px;
    font-weight:bold;
    transition:all .15s;
}

.box-tab:hover{border-color:#e94560;color:#e94560}
.box-tab.active{background:#e94560;color:#fff;border-color:#e94560}

.cat-filter{
    padding:8px 12px;
    border:2px solid #2a2a4a;
    border-radius:8px;
    font-size:13px;
    outline:none;
    background:#16213e;
    color:#ccc;
    cursor:pointer;
}

.cat-filter:focus{border-color:#e94560}

.toolbar-right{
    margin-left:auto;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.btn{
    padding:8px 16px;
    border:none;
    border-radius:8px;
    font-size:13px;
    font-weight:bold;
    cursor:pointer;
    transition:all .15s;
}

.btn:hover{opacity:.85}
.btn-primary{background:#e94560;color:#fff}
.btn-success{background:#e94560;color:#fff}
.btn-outline{background:transparent;border:2px solid #2a2a4a;color:#aaa}
.btn-outline:hover{border-color:#e94560;color:#e94560}
.btn-danger{background:#c0392b;color:#fff}
.btn-warning{background:#0f3460;color:#e0e0e0}
.btn-sm{padding:4px 10px;font-size:12px}

/* Table */
.box-group{
    background:#16213e;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
}

.box-group h2{margin-bottom:5px;color:#fff}
.box-group .desc{color:#7a7a9a;margin-bottom:15px;font-size:14px}

table{width:100%;border-collapse:collapse}

th{
    background:#0f3460;
    color:#ccc;
    padding:10px;
    text-align:left;
    font-size:13px;
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
}

th:hover{background:#153a6a}

th .sort-arrow{
    display:inline-block;
    margin-left:4px;
    font-size:10px;
    opacity:.6;
}

th.sorted .sort-arrow{opacity:1}

td{
    padding:10px;
    border-bottom:1px solid #1e2d4a;
    font-size:14px;
    color:#ccc;
}

tr:hover{background:#1e2d4a}

.badge{
    display:inline-block;
    padding:3px 10px;
    border-radius:15px;
    font-size:12px;
    white-space:nowrap;
    font-weight:600;
}

.working{background:#1b4332;color:#52b788}
.broken{background:#4a1525;color:#e94560}
.notworking{background:#4a3010;color:#f0a040}
.spare{background:#3a3510;color:#e0c040}

.box-tag{
    display:inline-block;
    background:#0f3460;
    color:#7fb3e0;
    padding:3px 10px;
    border-radius:6px;
    font-size:13px;
    font-weight:bold;
}

.no-results{
    text-align:center;
    padding:40px;
    color:#5a5a7a;
    font-size:18px;
}

.result-count{
    text-align:center;
    color:#7a7a9a;
    margin-bottom:15px;
    font-size:14px;
}

mark{background:#e9456040;color:#ff8a9e;padding:1px 3px;border-radius:3px}

.actions-cell{white-space:nowrap}
.actions-cell .btn{margin-right:4px}

/* Modal */
.modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    z-index:100;
    align-items:center;
    justify-content:center;
}

.modal-overlay.open{display:flex}

.modal{
    background:#16213e;
    border:1px solid #2a2a4a;
    border-radius:14px;
    padding:25px;
    width:90%;
    max-width:500px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.modal h2{margin-bottom:20px;color:#fff}

.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:13px;font-weight:bold;margin-bottom:5px;color:#8888aa}

.form-group input,
.form-group select{
    width:100%;
    padding:10px 12px;
    border:2px solid #2a2a4a;
    border-radius:8px;
    font-size:14px;
    outline:none;
    background:#1a1a2e;
    color:#eee;
}

.form-group input::placeholder{color:#5a5a7a}

.form-group input:focus,
.form-group select:focus{border-color:#e94560}

.modal-actions{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    margin-top:20px;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#4a4a6a;
    font-size:13px;
}

@media(max-width:600px){
    body{padding:10px}
    h1{font-size:22px;margin-bottom:14px}

    .search-wrap{margin-bottom:14px}
    .search-wrap input{padding:12px 16px 12px 40px;font-size:15px}

    .summary{gap:8px;margin-bottom:14px}
    .card{min-width:45%;padding:10px 12px}
    .card h2{font-size:11px}
    .card .num{font-size:22px}

    .toolbar{flex-direction:column;gap:8px}
    .box-tabs{gap:4px;width:100%;justify-content:space-between}
    .box-tab{padding:8px 0;font-size:12px;flex:1;text-align:center;min-width:0}
    .cat-filter{width:100%;font-size:14px;padding:10px 12px}
    .toolbar-right{margin-left:0;width:100%;gap:6px}
    .toolbar-right .btn{flex:1;padding:10px 8px;font-size:13px}

    .box-group{padding:12px;margin-bottom:14px}
    .box-group h2{font-size:16px}

    table{display:block}
    thead{display:none}
    tbody{display:block}

    tr{
        display:block;
        border:1px solid #2a2a4a;
        border-radius:10px;
        padding:12px;
        margin-bottom:10px;
        background:#16213e;
    }

    tr:hover{background:#1e2d4a}

    td{
        display:block;
        border:none;
        padding:2px 0;
        font-size:14px;
    }

    .td-item{
        font-weight:bold;
        font-size:16px;
        margin-bottom:6px;
        color:#fff;
    }

    .td-box{margin-bottom:6px}

    .td-cat{
        color:#7a7a9a;
        font-size:13px;
    }

    .td-cat::before{content:"Category: ";font-weight:600;color:#5a5a7a}

    .td-cond{margin:6px 0}

    .td-notes:empty{display:none}
    .td-notes{
        font-size:13px;
        color:#6a6a8a;
        font-style:italic;
        margin-bottom:6px;
    }

    .actions-cell{
        display:flex;
        gap:8px;
        margin-top:8px;
        padding-top:8px;
        border-top:1px solid #2a2a4a;
    }

    .actions-cell .btn{
        flex:1;
        padding:8px 12px;
        font-size:13px;
        text-align:center;
    }

    .badge{font-size:12px;padding:3px 10px}
    .box-tag{font-size:12px;padding:3px 10px}

    .result-count{font-size:13px;margin-bottom:10px}
    .no-results{padding:30px;font-size:16px}

    .modal-overlay{align-items:flex-end}
    .modal{
        width:100%;
        max-width:100%;
        padding:20px;
        border-radius:16px 16px 0 0;
        max-height:90vh;
        overflow-y:auto;
    }
    .modal h2{font-size:18px;margin-bottom:15px}
    .form-group{margin-bottom:12px}
    .form-group input,.form-group select{padding:12px;font-size:16px}
    .modal-actions{gap:8px}
    .modal-actions .btn{flex:1;padding:12px 16px;font-size:15px}
}
</style>

</head>
<body>

<div class="container">

<h1>Home Inventory</h1>

<div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="Search items, categories, notes..." autofocus>
</div>

<div class="summary" id="summary"></div>

<div class="toolbar">
    <div class="box-tabs" id="box-tabs"></div>
    <select class="cat-filter" id="cat-filter"><option value="">All Categories</option></select>
    <div class="toolbar-right">
        <button class="btn btn-success" onclick="openModal()">+ Add Item</button>
        <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
        <button class="btn btn-outline" onclick="exportJSON()">Export JSON</button>
    </div>
</div>

<div id="result-count" class="result-count"></div>
<div id="results"></div>

<div class="footer">Home Inventory Management</div>

</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modal">
<div class="modal">
    <h2 id="modal-title">Add Item</h2>
    <div class="form-group">
        <label>Item Name *</label>
        <input type="text" id="f-item" placeholder="e.g. Raspberry Pi 4">
    </div>
    <div class="form-group">
        <label>Box Number *</label>
        <select id="f-box">
            <option value="1">Box 1</option>
            <option value="2">Box 2</option>
            <option value="3">Box 3</option>
            <option value="4">Box 4</option>
            <option value="5">Box 5</option>
        </select>
    </div>
    <div class="form-group">
        <label>Category *</label>
        <input type="text" id="f-cat" placeholder="e.g. Electronics">
    </div>
    <div class="form-group">
        <label>Condition</label>
        <select id="f-cond">
            <option value="Working">Working</option>
            <option value="Broken">Broken</option>
            <option value="Not Working">Not Working</option>
            <option value="Spare">Spare</option>
        </select>
    </div>
    <div class="form-group">
        <label>Notes</label>
        <input type="text" id="f-notes" placeholder="Optional notes">
    </div>
    <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-save" onclick="saveItem()">Add Item</button>
    </div>
</div>
</div>

<script>
const STORAGE_KEY = 'home_inventory_data';

let BOX_DESCS = {};

function jsonToInventory(data) {
    const items = [];
    BOX_DESCS = {};
    for (const [boxNum, boxData] of Object.entries(data.boxes)) {
        const b = Number(boxNum);
        BOX_DESCS[b] = boxData.description;
        for (const it of boxData.items) {
            items.push({
                box: b,
                boxDesc: boxData.description,
                item: it.item,
                cat: it.category,
                cond: it.condition,
                notes: it.notes || ''
            });
        }
    }
    return items;
}

const COND_CLS = {Working:'working',Broken:'broken','Not Working':'notworking',Spare:'spare'};

let inventory = [];
let editingIndex = -1;
let sortCol = null;
let sortAsc = true;
let activeBox = 0;

async function load() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        inventory = JSON.parse(saved);
        if (!Object.keys(BOX_DESCS).length) {
            try {
                const resp = await fetch('data.json');
                const data = await resp.json();
                for (const [k, v] of Object.entries(data.boxes)) BOX_DESCS[Number(k)] = v.description;
            } catch(e) {
                for (const it of inventory) if (it.box && it.boxDesc) BOX_DESCS[it.box] = it.boxDesc;
            }
        }
    } else {
        try {
            const resp = await fetch('data.json');
            const data = await resp.json();
            inventory = jsonToInventory(data);
            save();
        } catch(e) {
            inventory = [];
        }
    }
}

function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
}

function getCategories() {
    return [...new Set(inventory.map(i => i.cat))].sort();
}

function renderBoxTabs() {
    const tabs = document.getElementById('box-tabs');
    let html = `<button class="box-tab ${activeBox === 0 ? 'active' : ''}" onclick="setBox(0)">All</button>`;
    for (let b = 1; b <= 5; b++) {
        html += `<button class="box-tab ${activeBox === b ? 'active' : ''}" onclick="setBox(${b})">Box ${b}</button>`;
    }
    tabs.innerHTML = html;
}

function renderCatFilter() {
    const sel = document.getElementById('cat-filter');
    const current = sel.value;
    const cats = getCategories();
    let html = '<option value="">All Categories</option>';
    cats.forEach(c => {
        html += `<option value="${c}" ${c === current ? 'selected' : ''}>${c}</option>`;
    });
    sel.innerHTML = html;
}

function setBox(b) {
    activeBox = b;
    renderBoxTabs();
    refresh();
}

function getFiltered() {
    const query = document.getElementById('search').value.trim().toLowerCase();
    const catFilter = document.getElementById('cat-filter').value;

    let items = inventory.map((item, idx) => ({...item, _idx: idx}));

    if (activeBox > 0) items = items.filter(i => i.box === activeBox);
    if (catFilter) items = items.filter(i => i.cat === catFilter);
    if (query) {
        items = items.filter(i =>
            i.item.toLowerCase().includes(query) ||
            i.cat.toLowerCase().includes(query) ||
            i.notes.toLowerCase().includes(query)
        );
    }

    if (sortCol) {
        items.sort((a, b) => {
            let va = a[sortCol], vb = b[sortCol];
            if (sortCol === 'box') return sortAsc ? va - vb : vb - va;
            va = (va || '').toLowerCase();
            vb = (vb || '').toLowerCase();
            if (va < vb) return sortAsc ? -1 : 1;
            if (va > vb) return sortAsc ? 1 : -1;
            return 0;
        });
    }

    return items;
}

function renderSummary(items) {
    const total = items.length;
    const boxes = new Set(items.map(i => i.box)).size;
    const working = items.filter(i => i.cond === 'Working').length;
    const broken = items.filter(i => i.cond === 'Broken' || i.cond === 'Not Working').length;

    document.getElementById('summary').innerHTML = `
        <div class="card"><h2>Total Items</h2><div class="num">${total}</div></div>
        <div class="card"><h2>Boxes</h2><div class="num">${boxes}</div></div>
        <div class="card"><h2>Working</h2><div class="num">${working}</div></div>
        <div class="card"><h2>Broken / Not Working</h2><div class="num">${broken}</div></div>
    `;
}

function highlight(text, query) {
    if (!query || !text) return text || '';
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function sortArrow(col) {
    if (sortCol !== col) return '<span class="sort-arrow">↕</span>';
    return `<span class="sort-arrow">${sortAsc ? '↑' : '↓'}</span>`;
}

function toggleSort(col) {
    if (sortCol === col) {
        sortAsc = !sortAsc;
    } else {
        sortCol = col;
        sortAsc = true;
    }
    refresh();
}

function renderResults(items) {
    const resultsDiv = document.getElementById('results');
    const resultCountDiv = document.getElementById('result-count');
    const query = document.getElementById('search').value.trim();
    const isSearching = query || activeBox > 0 || document.getElementById('cat-filter').value;

    if (items.length === 0) {
        resultsDiv.innerHTML = '<div class="no-results">No items found</div>';
        resultCountDiv.textContent = '';
        return;
    }

    resultCountDiv.textContent = isSearching ? `Found ${items.length} item${items.length !== 1 ? 's' : ''}` : '';

    if (isSearching || sortCol) {
        let html = '<div class="box-group"><table><thead><tr>';
        html += `<th class="${sortCol==='box'?'sorted':''}" onclick="toggleSort('box')">Box ${sortArrow('box')}</th>`;
        html += `<th class="${sortCol==='item'?'sorted':''}" onclick="toggleSort('item')">Item ${sortArrow('item')}</th>`;
        html += `<th class="${sortCol==='cat'?'sorted':''}" onclick="toggleSort('cat')">Category ${sortArrow('cat')}</th>`;
        html += `<th class="${sortCol==='cond'?'sorted':''}" onclick="toggleSort('cond')">Condition ${sortArrow('cond')}</th>`;
        html += `<th class="hide-mobile">Notes</th>`;
        html += '<th>Actions</th>';
        html += '</tr></thead><tbody>';

        items.forEach(i => {
            const cls = COND_CLS[i.cond] || 'working';
            const notesHtml = i.notes ? highlight(i.notes, query) : '';
            html += `<tr>
                <td data-label="Item" class="td-item">${highlight(i.item, query)}</td>
                <td data-label="Box" class="td-box"><span class="box-tag">Box ${i.box}</span></td>
                <td data-label="Category" class="td-cat">${highlight(i.cat, query)}</td>
                <td data-label="Condition" class="td-cond"><span class="badge ${cls}">${i.cond}</span></td>
                <td data-label="Notes" class="td-notes">${notesHtml}</td>
                <td class="actions-cell">
                    <button class="btn btn-warning btn-sm" onclick="editItem(${i._idx})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteItem(${i._idx})">Del</button>
                </td>
            </tr>`;
        });

        html += '</tbody></table></div>';
        resultsDiv.innerHTML = html;
    } else {
        const grouped = {};
        items.forEach(i => {
            if (!grouped[i.box]) grouped[i.box] = [];
            grouped[i.box].push(i);
        });

        let html = '';
        Object.keys(grouped).sort((a, b) => a - b).forEach(box => {
            const boxItems = grouped[box];
            const desc = BOX_DESCS[box] || '';
            html += `<div class="box-group">`;
            html += `<h2>Box ${box}</h2>`;
            html += `<div class="desc">${desc}</div>`;
            html += '<table><thead><tr>';
            html += `<th onclick="toggleSort('item')">Item ${sortArrow('item')}</th>`;
            html += `<th onclick="toggleSort('cat')">Category ${sortArrow('cat')}</th>`;
            html += `<th onclick="toggleSort('cond')">Condition ${sortArrow('cond')}</th>`;
            html += `<th class="hide-mobile">Notes</th>`;
            html += '<th>Actions</th>';
            html += '</tr></thead><tbody>';

            boxItems.forEach(i => {
                const cls = COND_CLS[i.cond] || 'working';
                const notesHtml = i.notes || '';
                html += `<tr>
                    <td data-label="Item" class="td-item">${i.item}</td>
                    <td data-label="Category" class="td-cat">${i.cat}</td>
                    <td data-label="Condition" class="td-cond"><span class="badge ${cls}">${i.cond}</span></td>
                    <td data-label="Notes" class="td-notes">${notesHtml}</td>
                    <td class="actions-cell">
                        <button class="btn btn-warning btn-sm" onclick="editItem(${i._idx})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteItem(${i._idx})">Del</button>
                    </td>
                </tr>`;
            });

            html += '</tbody></table></div>';
        });

        resultsDiv.innerHTML = html;
    }
}

function refresh() {
    const items = getFiltered();
    renderSummary(items);
    renderResults(items);
}

// Modal
function openModal(idx) {
    editingIndex = idx !== undefined ? idx : -1;
    const modal = document.getElementById('modal');
    const title = document.getElementById('modal-title');
    const saveBtn = document.getElementById('modal-save');

    if (editingIndex >= 0) {
        const item = inventory[editingIndex];
        title.textContent = 'Edit Item';
        saveBtn.textContent = 'Save Changes';
        document.getElementById('f-item').value = item.item;
        document.getElementById('f-box').value = item.box;
        document.getElementById('f-cat').value = item.cat;
        document.getElementById('f-cond').value = item.cond;
        document.getElementById('f-notes').value = item.notes;
    } else {
        title.textContent = 'Add Item';
        saveBtn.textContent = 'Add Item';
        document.getElementById('f-item').value = '';
        document.getElementById('f-box').value = '1';
        document.getElementById('f-cat').value = '';
        document.getElementById('f-cond').value = 'Working';
        document.getElementById('f-notes').value = '';
    }

    modal.classList.add('open');
    document.getElementById('f-item').focus();
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingIndex = -1;
}

function saveItem() {
    const item = document.getElementById('f-item').value.trim();
    const box = parseInt(document.getElementById('f-box').value);
    const cat = document.getElementById('f-cat').value.trim();
    const cond = document.getElementById('f-cond').value;
    const notes = document.getElementById('f-notes').value.trim();

    if (!item || !cat) {
        alert('Please fill in Item Name and Category.');
        return;
    }

    const entry = {
        box,
        boxDesc: BOX_DESCS[box] || '',
        item,
        cat,
        cond,
        notes,
    };

    if (editingIndex >= 0) {
        inventory[editingIndex] = entry;
    } else {
        inventory.push(entry);
    }

    save();
    closeModal();
    renderCatFilter();
    refresh();
}

function editItem(idx) {
    openModal(idx);
}

function deleteItem(idx) {
    const item = inventory[idx];
    if (confirm(`Delete "${item.item}" from Box ${item.box}?`)) {
        inventory.splice(idx, 1);
        save();
        renderCatFilter();
        refresh();
    }
}

// Export
function exportCSV() {
    const headers = ['Box', 'Item', 'Category', 'Condition', 'Notes'];
    const rows = inventory.map(i =>
        [i.box, i.item, i.cat, i.cond, i.notes].map(v => `"${String(v).replace(/"/g, '""')}"`)
    );
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    download('inventory.csv', csv, 'text/csv');
}

function exportJSON() {
    const data = inventory.map(i => ({
        box: i.box,
        item: i.item,
        category: i.cat,
        condition: i.cond,
        notes: i.notes,
    }));
    download('inventory.json', JSON.stringify(data, null, 2), 'application/json');
}

function download(filename, content, type) {
    const blob = new Blob([content], {type});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

// Hash support: index.html#box=3 opens filtered to Box 3
function applyHash() {
    const hash = location.hash.replace('#', '');
    const params = new URLSearchParams(hash);
    const box = parseInt(params.get('box'));
    if (box >= 1 && box <= 5) {
        activeBox = box;
        renderBoxTabs();
    }
    const q = params.get('q');
    if (q) document.getElementById('search').value = q;
}

(async function init() {
    await load();
    applyHash();
    renderBoxTabs();
    renderCatFilter();
    refresh();
})();

document.getElementById('search').addEventListener('input', refresh);
document.getElementById('cat-filter').addEventListener('change', refresh);
window.addEventListener('hashchange', function() { applyHash(); renderBoxTabs(); refresh(); });

document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});
