<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Box Labels — Print</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:Arial,Helvetica,sans-serif;
    margin:0;
    padding:20px;
}

.page{
    page-break-after:always;
    border:2px solid #000;
    border-radius:10px;
    padding:20px 25px;
    max-width:700px;
    margin:0 auto 30px;
}

.page:last-child{page-break-after:avoid}

.header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    border-bottom:3px solid #000;
    padding-bottom:12px;
    margin-bottom:15px;
}

.header-left{flex:1}

.box-num{
    font-size:36px;
    font-weight:bold;
}

.box-desc{
    font-size:13px;
    color:#444;
    margin-top:4px;
}

.qr{
    width:120px;
    height:120px;
    margin-left:15px;
    flex-shrink:0;
}

.qr svg{width:120px!important;height:120px!important}

.item-count{
    font-size:13px;
    margin-bottom:12px;
    color:#333;
}

.scan-hint{
    font-size:10px;
    color:#888;
    text-align:right;
    margin-top:2px;
}

.items{
    column-count:2;
    column-gap:20px;
    font-size:13px;
    line-height:1.8;
}

.item{
    break-inside:avoid;
    padding:1px 0;
}

.item-num{
    display:inline-block;
    width:22px;
    font-weight:bold;
    color:#555;
    text-align:right;
    margin-right:4px;
}

.cond{
    font-size:11px;
    font-weight:bold;
    margin-left:3px;
}

.cond-broken{color:#c00}
.cond-notworking{color:#c60}
.cond-spare{color:#888}

.note{
    font-size:11px;
    color:#666;
    font-style:italic;
}

.footer{
    border-top:1px solid #999;
    margin-top:15px;
    padding-top:8px;
    font-size:11px;
    color:#888;
    text-align:center;
}

@media print{
    body{padding:0}
    .page{border:2px solid #000;box-shadow:none;margin:0 auto;max-width:100%}
    .no-print{display:none}
}

@media screen{
    .no-print{
        text-align:center;
        padding:15px;
        margin-bottom:20px;
        max-width:700px;
        margin-left:auto;
        margin-right:auto;
    }
    .url-config{
        margin-bottom:15px;
        font-size:14px;
    }
    .url-config input{
        padding:8px 12px;
        width:400px;
        max-width:90%;
        border:2px solid #ddd;
        border-radius:8px;
        font-size:14px;
        margin-top:5px;
    }
    .url-config input:focus{border-color:#0d6efd;outline:none}
    .print-btn{
        padding:10px 30px;
        font-size:16px;
        font-weight:bold;
        background:#0d6efd;
        color:#fff;
        border:none;
        border-radius:8px;
        cursor:pointer;
    }
    .print-btn:hover{opacity:.85}
    .regen-btn{
        padding:8px 20px;
        font-size:14px;
        background:#28a745;
        color:#fff;
        border:none;
        border-radius:8px;
        cursor:pointer;
        margin-left:8px;
    }
}
</style>

</head>
<body>

<div class="no-print">
    <div class="url-config">
        <strong>Base URL for QR codes:</strong><br>
        <input type="text" id="base-url" value="https://shubham3521.github.io/inventory/index.html" placeholder="e.g. https://yourname.github.io/inventory/index.html">
        <button class="regen-btn" onclick="generateAll()">Update QR Codes</button>
        <div style="font-size:12px;color:#888;margin-top:5px">
            Works with local file paths or hosted URLs. Once you host on GitHub Pages, paste the URL here.
        </div>
    </div>
    <button class="print-btn" onclick="window.print()">Print All Labels</button>
</div>

<div id="pages"></div>

function makeQR(text) {
    var qr = qrcode(0, 'M');
    qr.addData(text);
    qr.make();
    var size = qr.getModuleCount();
    var scale = 4;
    var totalSize = size * scale;
    var rects = '';
    for (var r = 0; r < size; r++) {
        for (var c = 0; c < size; c++) {
            if (qr.isDark(r, c)) {
                rects += '<rect x="' + (c*scale) + '" y="' + (r*scale) + '" width="' + scale + '" height="' + scale + '"/>';
            }
        }
    }
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + totalSize + ' ' + totalSize + '" width="' + totalSize + '" height="' + totalSize + '">';
    svg += '<rect width="100%" height="100%" fill="#fff"/>';
    svg += '<g fill="#000">' + rects + '</g>';
    svg += '</svg>';
    var div = document.createElement('div');
    div.innerHTML = svg;
    return div.firstChild;
}

function condTag(cond) {
    if (cond === 'Broken') return ' <span class="cond cond-broken">[BROKEN]</span>';
    if (cond === 'Not Working') return ' <span class="cond cond-notworking">[NOT WORKING]</span>';
    if (cond === 'Spare') return ' <span class="cond cond-spare">[SPARE]</span>';
    return '';
}

function generateAll() {
    var baseUrl = document.getElementById('base-url').value.trim() || 'index.html';
    var pagesDiv = document.getElementById('pages');
    pagesDiv.innerHTML = '';

    for (var box = 1; box <= 5; box++) {
        var data = BOX_DATA[box];
        var url = baseUrl + '#box=' + box;

        var page = document.createElement('div');
        page.className = 'page';

        var html = '<div class="header">';
        html += '<div class="header-left">';
        html += '<div class="box-num">BOX ' + box + '</div>';
        html += '<div class="box-desc">' + data.desc + '</div>';
        html += '</div>';
        html += '<div class="qr" id="qr-' + box + '"></div>';
        html += '</div>';
        html += '<div style="display:flex;justify-content:space-between;align-items:center">';
        html += '<div class="item-count">' + data.items.length + ' items (A-Z)</div>';
        html += '<div class="scan-hint">Scan to search &#8599;</div>';
        html += '</div>';
        html += '<div class="items">';

        data.items.forEach(function(item, idx) {
            html += '<div class="item">';
            html += '<span class="item-num">' + (idx + 1) + '.</span> ';
            html += item.name;
            html += condTag(item.cond);
            if (item.note) html += ' <span class="note">— ' + item.note + '</span>';
            html += '</div>';
        });

        html += '</div>';
        html += '<div class="footer">Home Inventory — Box ' + box + '</div>';

        page.innerHTML = html;
        pagesDiv.appendChild(page);

        var qrSvg = makeQR(url);
        document.getElementById('qr-' + box).appendChild(qrSvg);
    }
}
